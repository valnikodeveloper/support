<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Support - Valerii Nikolaev</title>
  <style>
    :root {
      --bg: #eef3f8;
      --card: #ffffff;
      --text: #102033;
      --muted: #526273;
      --line: #d8e1ea;
      --accent: #0c5f8f;
      --ok: #1e7d4f;
      --err: #a13333;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(12, 95, 143, 0.10), transparent 28%),
        linear-gradient(180deg, #f4f8fb 0%, #eaf1f7 100%);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(16, 32, 51, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.95rem;
      line-height: 1.2;
    }
    .muted {
      color: var(--muted);
    }
    label {
      display: block;
      margin: 18px 0 6px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fbfdfe;
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    select {
      /* Safari ignores padding on native selects - use custom appearance */
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
      padding-right: 40px;
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'%3E%3Cpath d='M1 1l6 6 6-6' fill='none' stroke='%23526273' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }
    button {
      margin-top: 22px;
      width: 100%;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #0a5279;
    }
    button:disabled {
      background: #8fa9bb;
      cursor: default;
    }
    .status {
      display: none;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      font-weight: 600;
    }
    .status.show {
      display: block;
    }
    .status.ok {
      color: var(--ok);
      background: rgba(30, 125, 79, 0.08);
      border: 1px solid rgba(30, 125, 79, 0.25);
    }
    .status.err {
      color: var(--err);
      background: rgba(161, 51, 51, 0.07);
      border: 1px solid rgba(161, 51, 51, 0.25);
    }
    .status a {
      color: inherit;
    }
    /* Honeypot field - hidden from humans */
    .hp {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <article class="card">
      <h1>App Support</h1>
      <p class="muted">
        Have a question, found a bug, or want to suggest a feature?
        Send a message below and I will get back to you by email.
      </p>

      <form id="support-form" novalidate>
        <label for="app">App</label>
        <select id="app" name="app" required>
          <option value="AirHorizon">AirHorizon</option>
          <option value="Handstand Balance">Handstand Balance</option>
          <option value="PriceFuse">PriceFuse</option>
          <option value="RepChime">RepChime</option>
          <option value="Other">Other</option>
        </select>

        <label for="email">Your email</label>
        <input id="email" name="email" type="email" required
               placeholder="you@example.com" autocomplete="email" />

        <label for="name">Name (optional)</label>
        <input id="name" name="name" type="text" autocomplete="name" />

        <label for="message">Message</label>
        <textarea id="message" name="message" required
                  placeholder="Describe your question or issue..."></textarea>

        <div class="hp" aria-hidden="true">
          <label for="_honey">Leave this field empty</label>
          <input id="_honey" name="_honey" type="text" tabindex="-1" autocomplete="off" />
        </div>

        <button type="submit" id="submit-btn">Send message</button>

        <p class="status ok" id="status-ok" role="status">
          Thank you! Your message has been sent.
        </p>
        <p class="status err" id="status-err" role="alert">
          Sorry, the message could not be sent. Please email
          <a id="mailto-link" href="#">me directly</a>.
        </p>
      </form>
    </article>
  </main>

  <script>
    // FormSubmit random alias - hides the real email from the page source.
    var FORM_ENDPOINT = "https://formsubmit.co/ajax/74030777cf766301affc1e3e485213db";
    // Fallback contact address, assembled at runtime so crawlers scanning the
    // source for email patterns don't pick it up.
    var CONTACT_EMAIL = ["valnikodeveloper", "gmail.com"].join("@");

    var form = document.getElementById("support-form");

    // Preselect the app via query string, e.g. ?app=handstand-balance
    // Matching ignores case, spaces and dashes: ?app=RepChime, ?app=pricefuse,
    // ?app=Handstand%20Balance all work.
    (function () {
      var requested = new URLSearchParams(location.search).get("app");
      if (!requested) return;
      var norm = function (s) { return s.toLowerCase().replace(/[^a-z0-9]/g, ""); };
      var options = form.app.options;
      for (var i = 0; i < options.length; i++) {
        if (norm(options[i].value) === norm(requested)) {
          form.app.selectedIndex = i;
          break;
        }
      }
    })();
    var btn = document.getElementById("submit-btn");
    var okBox = document.getElementById("status-ok");
    var errBox = document.getElementById("status-err");
    document.getElementById("mailto-link").href = "mailto:" + CONTACT_EMAIL;

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      okBox.classList.remove("show");
      errBox.classList.remove("show");

      if (!form.reportValidity()) return;

      var app = form.app.value;
      var payload = {
        _subject: "[Support] " + app,
        _template: "table",
        _honey: form._honey.value,
        app: app,
        name: form.name.value,
        email: form.email.value,
        message: form.message.value
      };

      btn.disabled = true;
      btn.textContent = "Sending...";

      fetch(FORM_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(payload)
      })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function () {
          form.reset();
          form.app.value = app;
          okBox.classList.add("show");
        })
        .catch(function () {
          errBox.classList.add("show");
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = "Send message";
        });
    });
  </script>
</body>
</html>
